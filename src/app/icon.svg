<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Fond dégradé -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0369a1"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- Soleil -->
  <circle cx="18" cy="11" r="5" fill="#fbbf24"/>
  <!-- Rayons du soleil -->
  <line x1="18" y1="4"  x2="18" y2="6"  stroke="#fbbf24" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="18" y1="16" x2="18" y2="18" stroke="#fbbf24" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="25" y1="11" x2="23" y2="11" stroke="#fbbf24" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="13" y1="11" x2="11" y2="11" stroke="#fbbf24" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="23.2" y1="6.8"  x2="21.8" y2="8.2"  stroke="#fbbf24" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="14.2" y1="15.8" x2="12.8" y2="17.2" stroke="#fbbf24" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Nuage -->
  <ellipse cx="14" cy="21" rx="7" ry="4" fill="white" opacity="0.95"/>
  <ellipse cx="11" cy="22" rx="4" ry="3" fill="white" opacity="0.95"/>
  <ellipse cx="19" cy="22" rx="4" ry="3" fill="white" opacity="0.95"/>
  <ellipse cx="15" cy="20" rx="5" ry="3.5" fill="white" opacity="0.95"/>
</svg>
